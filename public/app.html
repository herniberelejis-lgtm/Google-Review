<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Review App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; }

    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
    .login-box h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 28px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
    .form-group input:focus { outline: none; border-color: #667eea; }
    .btn-login { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn-login:hover { background: #764ba2; }
    .error { color: #e74c3c; margin-top: 10px; text-align: center; }

    .app-screen { display: none; }
    .app-screen.active { display: block; }

    .app-header { background: white; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
    .app-header-top { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .app-header h1 { font-size: 24px; color: #333; }
    .btn-logout { background: #e74c3c; color: white; padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }

    .tabs { display: flex; gap: 0; border-bottom: 2px solid #e0e0e0; max-width: 1200px; margin: 0 auto; }
    .tab { padding: 15px 20px; cursor: pointer; border: none; background: none; font-size: 14px; font-weight: 600; color: #999; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    .tab.active { color: #667eea; border-bottom-color: #667eea; }
    .tab:hover { color: #667eea; }

    .content { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    .panel { display: none; }
    .panel.active { display: block; }

    .summary { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
    .stat-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex: 1; min-width: 150px; }
    .stat-box h3 { font-size: 12px; color: #999; text-transform: uppercase; margin-bottom: 10px; }
    .stat-box .num { font-size: 32px; font-weight: bold; color: #333; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .card h3 { color: #667eea; margin-bottom: 15px; font-size: 18px; }
    .card input, .card textarea, .card select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit; }
    .card textarea { resize: vertical; min-height: 60px; }
    .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 600; margin-bottom: 10px; margin-right: 8px; }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover { background: #764ba2; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover { background: #229954; }

    .qr-preview { width: 120px; height: 120px; margin: 10px 0; }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-libre { background: #d5f4e6; color: #27ae60; }
    .status-configurada { background: #ffeaa7; color: #f39c12; }

    .search { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .tabs { flex-wrap: wrap; }
      .tab { padding: 12px 15px; font-size: 12px; }
      .summary { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h1>🔐 Panel Admin</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn-login">Entrar</button>
      <div class="error" id="loginError"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="app-screen">
  <div class="app-header">
    <div class="app-header-top">
      <h1>📊 Google Review + CRM</h1>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('qr')">🔗 Gestión de QR</button>
      <button class="tab" onclick="switchTab('crm')">👥 CRM de Locales</button>
      <button class="tab" onclick="switchTab('stats')">📈 Estadísticas</button>
    </div>
  </div>

  <div class="content">
    <!-- QR PANEL -->
    <div id="qrPanel" class="panel active">
      <div class="summary" id="qrSummary"></div>
      <div style="margin-bottom: 20px;">
        <button class="btn btn-success" onclick="exportQRList()">⬇️ Descargar lista de QR</button>
      </div>
      <div class="grid" id="qrGrid"></div>
    </div>

    <!-- CRM PANEL -->
    <div id="crmPanel" class="panel">
      <div class="summary" id="crmSummary"></div>
      <div style="margin-bottom: 20px;">
        <input type="search" id="crmSearch" class="search" placeholder="Buscar por nombre, zona, estado...">
        <button class="btn btn-success" onclick="addCrmLocal()">+ Agregar local</button>
        <button class="btn btn-primary" onclick="exportCRMCsv()">📥 Exportar CSV</button>
      </div>
      <div id="crmCards"></div>
    </div>

    <!-- STATS PANEL -->
    <div id="statsPanel" class="panel">
      <h2>Estadísticas Generales</h2>
      <div class="summary" id="generalStats"></div>
      <div id="statsDetail"></div>
    </div>
  </div>
</div>

<script>
const PASSWORD = 'admin123';

// QR STATE
let pieces = [];

// CRM STATE
const ESTADOS = [
  { v: "a-contactar", l: "A contactar" },
  { v: "contactado", l: "Contactado" },
  { v: "en-conversacion", l: "En conversación" },
  { v: "visita-agendada", l: "Visita agendada" },
  { v: "vendido", l: "Vendido" },
  { v: "rechazado", l: "Rechazado" },
];
let leads = [];

// LOGIN
document.getElementById('loginForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const pwd = document.getElementById('password').value;
  if (pwd === PASSWORD) {
    localStorage.setItem('authenticated', 'true');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').classList.add('active');
    loadAll();
  } else {
    document.getElementById('loginError').textContent = 'Contraseña incorrecta';
  }
});

function logout() {
  localStorage.removeItem('authenticated');
  location.reload();
}

// CHECK AUTH
window.addEventListener('load', () => {
  if (!localStorage.getItem('authenticated')) {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').classList.remove('active');
  } else {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').classList.add('active');
    loadAll();
  }
});

// TABS
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab + 'Panel').classList.add('active');
}

// LOAD ALL DATA
async function loadAll() {
  await loadPieces();
  await loadLeads();
}

// QR FUNCTIONS
async function loadPieces() {
  const res = await fetch('/api/admin/pieces');
  pieces = await res.json();
  renderQR();
}

function renderQR() {
  const total = pieces.length;
  const configured = pieces.filter(p => p.status === 'configurada').length;

  document.getElementById('qrSummary').innerHTML = `
    <div class="stat-box">
      <h3>Total Piezas</h3>
      <div class="num">${total}</div>
    </div>
    <div class="stat-box">
      <h3>Configuradas</h3>
      <div class="num">${configured}</div>
    </div>
  `;

  const grid = document.getElementById('qrGrid');
  grid.innerHTML = '';
  pieces.forEach(piece => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h3>Pieza #${piece.code}</h3>
      <span class="status-badge status-${piece.status}">${piece.status}</span>
      <input type="text" placeholder="Nombre negocio" value="${piece.name || ''}" onchange="updatePiece('${piece.code}', 'name', this.value)">
      <input type="url" placeholder="Link Google Maps" value="${piece.link || ''}" onchange="updatePiece('${piece.code}', 'link', this.value)">
      <button class="btn btn-primary" onclick="downloadQR('${piece.code}')">📥 Descargar QR</button>
      <div id="qr-${piece.code}"></div>
    `;
    grid.appendChild(card);
    if (piece.status === 'configurada') loadQRImage(piece.code);
  });
}

async function updatePiece(code, field, value) {
  if (!value) return;
  await fetch('/api/admin/pieces', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code, [field]: value })
  });
  loadPieces();
}

async function loadQRImage(code) {
  const res = await fetch(`/api/admin/qr?code=${code}`);
  const data = await res.json();
  const container = document.getElementById(`qr-${code}`);
  const img = document.createElement('img');
  img.src = data.qr;
  img.className = 'qr-preview';
  container.appendChild(img);
}

async function downloadQR(code) {
  const res = await fetch(`/api/admin/qr?code=${code}`);
  const data = await res.json();
  const link = document.createElement('a');
  link.href = data.qr;
  link.download = `qr-${code}.png`;
  link.click();
}

function exportQRList() {
  const csv = pieces.map(p => `${p.code},${p.name || ''},${p.link || ''}`).join('\n');
  const blob = new Blob(['Código,Nombre,Link\n' + csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'qr-list.csv';
  a.click();
}

// CRM FUNCTIONS
async function loadLeads() {
  const res = await fetch('/api/leads');
  leads = await res.json();
  renderCRM();
}

function renderCRM() {
  const total = leads.length;
  const enCurso = leads.filter(l => ['contactado', 'en-conversacion', 'visita-agendada'].includes(l.estado)).length;
  const vendidos = leads.filter(l => l.estado === 'vendido').length;

  document.getElementById('crmSummary').innerHTML = `
    <div class="stat-box">
      <h3>Total Locales</h3>
      <div class="num">${total}</div>
    </div>
    <div class="stat-box">
      <h3>En Curso</h3>
      <div class="num">${enCurso}</div>
    </div>
    <div class="stat-box">
      <h3>Cerrados</h3>
      <div class="num">${vendidos}</div>
    </div>
  `;

  const query = document.getElementById('crmSearch')?.value || '';
  const filtered = leads.filter(l => {
    const haystack = `${l.local} ${l.zona} ${l.contacto} ${l.estado}`.toLowerCase();
    return haystack.includes(query.toLowerCase());
  });

  const container = document.getElementById('crmCards');
  container.innerHTML = '';
  filtered.forEach(lead => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h3>${lead.local || 'Sin nombre'}</h3>
      <input type="text" placeholder="Nombre local" value="${lead.local}" onchange="updateLead('${lead.id}', 'local', this.value)">
      <input type="text" placeholder="Zona" value="${lead.zona}" onchange="updateLead('${lead.id}', 'zona', this.value)">
      <input type="text" placeholder="Contacto/teléfono" value="${lead.contacto}" onchange="updateLead('${lead.id}', 'contacto', this.value)">
      <select onchange="updateLead('${lead.id}', 'estado', this.value)">
        ${ESTADOS.map(e => `<option value="${e.v}" ${e.v === lead.estado ? 'selected' : ''}>${e.l}</option>`).join('')}
      </select>
      <textarea placeholder="Notas" onchange="updateLead('${lead.id}', 'notas', this.value)">${lead.notas}</textarea>
      <button class="btn btn-danger" onclick="deleteLead('${lead.id}')">🗑️ Eliminar</button>
    `;
    container.appendChild(card);
  });
}

async function updateLead(id, field, value) {
  const lead = leads.find(l => l.id === id);
  if (lead) {
    lead[field] = value;
    await fetch('/api/leads', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(leads)
    });
  }
}

async function deleteLead(id) {
  if (!confirm('¿Eliminar este local?')) return;
  leads = leads.filter(l => l.id !== id);
  await fetch('/api/leads', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(leads)
  });
  loadLeads();
}

function addCrmLocal() {
  const newLead = {
    id: 'local-' + Date.now(),
    local: '',
    zona: '',
    contacto: '',
    estado: 'a-contactar',
    notas: ''
  };
  leads.unshift(newLead);
  fetch('/api/leads', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(leads)
  });
  loadLeads();
}

function exportCRMCsv() {
  const header = ['Nombre', 'Zona', 'Contacto', 'Estado', 'Notas'];
  const rows = leads.map(l => [l.local, l.zona, l.contacto, l.estado, l.notas]);
  const csv = [header, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'crm-locales.csv';
  a.click();
}

// STATS
function renderStats() {
  const totalQR = pieces.length;
  const totalLeads = leads.length;
  document.getElementById('generalStats').innerHTML = `
    <div class="stat-box">
      <h3>QR Totales</h3>
      <div class="num">${totalQR}</div>
    </div>
    <div class="stat-box">
      <h3>Locales en BD</h3>
      <div class="num">${totalLeads}</div>
    </div>
  `;
}

document.getElementById('crmSearch').addEventListener('input', renderCRM);
</script>

</body>
</html>
